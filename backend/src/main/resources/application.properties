spring.datasource.url=jdbc:mysql://localhost:3306/arcade
spring.datasource.username=root
spring.datasource.password=Kutty#33#
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

arcade.upload-dir=${ARCADE_UPLOAD_DIR:uploads}
arcade.jwt-secret=${ARCADE_JWT_SECRET:dev-secret-change-me}
arcade.jwt-expiration-ms=${ARCADE_JWT_EXPIRATION_MS:604800000}

arcade.razorpay.key-id=${ARCADE_RAZORPAY_KEY_ID:}
arcade.razorpay.key-secret=${ARCADE_RAZORPAY_KEY_SECRET:}

spring.mail.host=${ARCADE_MAIL_HOST:}
spring.mail.port=${ARCADE_MAIL_PORT:587}
spring.mail.username=${ARCADE_MAIL_USERNAME:}
spring.mail.password=${ARCADE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

