spring.datasource.url=jdbc:mysql://localhost:3306/arcade
spring.datasource.username=arcade_user
spring.datasource.password=arcade_password
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

arcade.upload-dir=${ARCADE_UPLOAD_DIR:uploads}
arcade.jwt-secret=${ARCADE_JWT_SECRET:dev-secret-change-me}
arcade.jwt-expiration-ms=${ARCADE_JWT_EXPIRATION_MS:604800000}

arcade.razorpay.key-id=${ARCADE_RAZORPAY_KEY_ID:}
arcade.razorpay.key-secret=${ARCADE_RAZORPAY_KEY_SECRET:}

spring.mail.host=${ARCADE_MAIL_HOST:}
spring.mail.port=${ARCADE_MAIL_PORT:587}
spring.mail.username=${ARCADE_MAIL_USERNAME:}
spring.mail.password=${ARCADE_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

